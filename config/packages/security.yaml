security:
    password_hashers:
        App\Entity\Users:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: email   # <-- ici on change username -> email

    firewalls:
        login:
            pattern: ^/api/v1/connexion
            stateless: true
            json_login:
                check_path: /api/v1/connexion
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        register:
            pattern: ^/api/v1/register
            methods: [POST]
            stateless: true

        token_refresh:
            pattern: ^/api/token/refresh
            methods: [POST]
            stateless: true

        password_reset:
            pattern: ^/api/password-reset
            methods: [POST]
            stateless: true

        health:
            pattern: ^/api/health$
            stateless: true

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/v1/connexion,   roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh,  roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/register,     roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/users$,         roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/password-reset, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/health$,        roles: PUBLIC_ACCESS }
        - { path: ^/api,                roles: IS_AUTHENTICATED_FULLY }

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER
