framework:
    cache:
        # Système de fichier pour le cache applicatif (dev / petit scale)
        # En prod, remplacer par Redis :
        #   app: cache.adapter.redis
        #   default_redis_provider: '%env(REDIS_URL)%'

        prefix_seed: nandia/app

        pools:
            # Cache dédié pour les stats (5 min TTL, isolation du cache Doctrine)
            app.stats_cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 300
